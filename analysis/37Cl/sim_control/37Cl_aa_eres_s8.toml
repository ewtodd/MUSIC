[run]
n_events = 100000
threads = 32
wait = 0
update = 0
max_time = 2000.0                                                                      # ns
sim_step = 0.001                                                                       # cm
method = 0
output = "/home/e-work/MUSIC/analysis/37Cl/sim_root_files/traces_37Cl_aa_eres_s8.root"
file_opt = "recreate"
print_opt = 0
