[gas]
species = "4He"     # Fill gas: 4He, 3He, Ar, CF4, CH4, P10, iC4H10
pressure = 220.0    # Torr
temperature = 293.0 # K

[beam]
species = "37Cl"  # Use "AEl" notation
energy = 92.0     # Beam KE at the accelerator (before entrance window) [MeV]
energy_fwhm = 0.9 # Beam energy FWHM at accelerator [MeV]
dedx_scale = 1.0  # Beam stopping power scale factor

[target]
species = "4He"
compound = "41K"

[windows.entrance]
# mg/cm^2 areal density; -1 disables
material = "Ti"
thickness_mg_cm2 = 0.9

[windows.exit]
# mg/cm^2 areal density; -1 disables
material = "Ti"
thickness_mg_cm2 = 1.3

[windows.degrader]
thickness_um = -1

[detector]
eloss_bins = 555            # Number of bins for y axis
max_eloss = 10.0            # Max y value [MeV]
strip = 14                  # -1 for unreacted beam
ignore_short_strips = false # true zeroes 4 cm half-strips on L/R anode branches
# Per-channel readout noise σ [MeV]. -1 on a given channel disables noise
# there. Mutually exclusive with a scalar `eres` key in [detector].
